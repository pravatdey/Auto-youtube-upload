# Push changes to this file to trigger automated YouTube uploads via GitHub Actions.
#
# Each job downloads a video from Google Drive, processes it (pitch shift + watermark),
# splits into parts, and uploads to YouTube in the specified playlist.

jobs:
  # Example job - replace with your actual values:
  # - gdrive_url: "https://drive.google.com/file/d/YOUR_FILE_ID/view"
  #   title: "Complete Ancient History"
  #   playlist: "Complete Ancient History"
  #   description: "Ancient History for UPSC preparation"
  #   # Optional overrides (defaults come from config.yaml):
  #   # tags: ["UPSC", "Ancient History"]
  #   # privacy: "private"
  #   # pitch: 1.15
  #   # split_duration: 900
