# ===== Video Processing =====
pitch_shift: 1.15            # 15% pitch up (sounds different enough to avoid copyright)
split_duration: 900           # 15 minutes in seconds
crf: 20                       # Video quality (lower = better, 18-23 recommended)
preset: fast                  # Encoding speed: ultrafast, superfast, veryfast, fast, medium, slow

# ===== Your Watermark / Branding =====
watermark_text: "Civil Services & Competitive Exam Prep"
logo_path: "assets/watermark.png"    # Path to your PNG logo
logo_position: "bottom-right"        # top-left, top-right, bottom-left, bottom-right, center
logo_scale: 0.05                     # Logo size 5% of video width
text_position: "top-left"            # Where to place text watermark
font_size: 24
font_color: "white@0.75"            # Color with transparency (0.0 = invisible, 1.0 = solid)

# ===== Your Name (replaces "By- Aadesh Singh" during intro only) =====
intro_byline: "By- Pravat Kumar Dey"
intro_byline_fontsize: 20
intro_byline_color: "white"

# ===== Existing Watermark Removal =====
# Set coordinates to remove original watermarks/logos from source video
# Format: "x%:y%:width%:height%" - percentages of video dimensions, use null to skip
remove_watermark: null                   # Disabled
blur_region: null                        # Disabled

# Additional blur regions to remove more branding
extra_blur_regions: []                   # Disabled

# ===== Intro Cover (first 2 minutes) =====
# Covers StudyIQ marketing, teacher name, icons in first 120 seconds
intro_cover_duration: 120             # 2 minutes in seconds
intro_mute_duration: 120              # Mute audio for first 2 minutes (removes StudyIQ audio mentions)

# Regions to cover with black box during intro (hides StudyIQ branding)
intro_cover_regions:
  - region: "0%:0%:100%:15%"          # Top banner - StudyIQ text & logo
    color: "black"
    opacity: "0.95"
  - region: "0%:85%:100%:15%"         # Bottom area - teacher name "By- Aadesh Singh"
    color: "black"
    opacity: "0.95"

# Your branding shown during intro (overlaid on the covered areas)
intro_name: "Pravat Kumar Dey"
intro_name_fontsize: 36
intro_name_color: "white"
intro_channel_text: "Civil Services & Competitive Exam Prep"
intro_channel_fontsize: 28

# ===== Playlist =====
playlist_name: null                  # YouTube playlist name (set to null to skip playlist)

# ===== Thumbnail =====
thumbnail_path: "assets/thumbnail.jpg"   # Path to thumbnail image (JPG/PNG, max 2MB, 1280x720 recommended)

# ===== YouTube Upload =====
default_privacy: "public"            # Videos are public immediately after upload
category_id: "27"                    # 27 = Education
default_tags:
  - "UPSC"
  - "UPSC current affairs"
  - "UPSC 2025"
  - "IAS preparation"
  - "civil services"
  - "current affairs today"
  - "daily current affairs"
  - "UPSC prelims"
  - "UPSC mains"
  - "IAS IPS preparation"
  - "current affairs for UPSC"
  - "UPSC news"
  - "competitive exam"
  - "GK today"
  - "current affairs in english"
title_template: "{title} - Part {part_number}"
description_template: "Part {part_number} of {total_parts}"

# ===== YouTube Credentials =====
client_secrets_file: "config/client_secrets.json"
token_file: "config/youtube_token.json"

# ===== Paths =====
input_dir: "C:/Users/PravatkumarDey/Downloads"
output_dir: "output"
temp_dir: "D:/temp"                  # FFmpeg temp directory (C: drive is full, use D:)
